<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>EDGE Bible Study</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #0E2A52;
      --navy-deep:   #081A35;
      --accent:      #2A7BD4;
      --accent-soft: #E8F1FB;
      --ink:         #0F172A;
      --ink-soft:    #334155;
      --muted:       #64748B;
      --rule:        #E2E8F0;
      --paper:       #FFFFFF;
      --canvas:      #F8FAFC;
      --edge-explore: #4A9D4A;
      --edge-dig:     #E08833;
      --edge-gather:  #2A7BD4;
      --edge-embrace: #8E54B5;
      --serif:        'EB Garamond', serif;
      --sans:         'Atkinson Hyperlegible', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--canvas);
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }

    .phone {
      width: 100%; max-width: 420px; height: 100vh; max-height: 900px;
      background: var(--paper); box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }

    /* Progress Bar with Edge Colors */
    .progress-bar { height: 4px; background: var(--rule); display: flex; }
    .progress-segment { height: 100%; flex: 1; transition: opacity 0.3s; opacity: 0.2; }
    .progress-segment.active { opacity: 1; }

    .header { background: var(--navy); color: white; padding: 20px; position: relative; }
    .header::after {
        content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(90deg, var(--edge-explore) 25%, var(--edge-dig) 50%, var(--edge-gather) 75%, var(--edge-embrace) 100%);
    }

    .body { flex: 1; overflow-y: auto; padding: 24px; }
    
    /* Bible Reader Text */
    .verse-card { background: var(--canvas); border-radius: 12px; padding: 20px; margin-bottom: 20px; line-height: 1.6; font-family: var(--serif); font-size: 20px; }
    .tappable-word { color: var(--accent); cursor: pointer; transition: background 0.2s; border-radius: 4px; padding: 0 2px; }
    .tappable-word:hover { background: var(--accent-soft); }
    .tappable-word.is-active { background: var(--accent); color: white; }

    /* Lexicon Quick Banner */
    .quick-banner {
      background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
      color: white; border-radius: 12px; padding: 16px; margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15); animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .quick-title { font-weight: bold; font-size: 18px; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .quick-body { font-family: var(--serif); font-style: italic; font-size: 17px; opacity: 0.9; }
    .dig-hint { font-size: 12px; margin-top: 10px; color: #BCDDFF; text-align: right; }

    /* Modal Styling */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; z-index: 100; }
    .modal-content { background: white; width: 100%; border-radius: 20px 20px 0 0; max-height: 85vh; overflow-y: auto; padding: 24px; position: relative; }
    .modal-header { border-bottom: 1px solid var(--rule); padding-bottom: 15px; margin-bottom: 15px; }
    .close-btn { position: absolute; top: 15px; right: 15px; background: var(--rule); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }

    .btn { background: var(--navy); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
    .input { width: 100%; padding: 12px; border: 1px solid var(--rule); border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
    
    /* "What this means" Note */
    .pastoral-note { background: var(--accent-soft); border-left: 4px solid var(--accent); padding: 12px; border-radius: 4px; margin-bottom: 15px; }
    .pastoral-label { font-weight: bold; font-size: 12px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Mock Data ---
    const LEXICON = {
      "G0025": {
        id: "G0025", lemma: "ἀγαπάω", translit: "agapaō", gloss: "to love",
        pastoral: "A decision to act in the best interest of another. Not a feeling that comes and goes, but a settled commitment of the will.",
        definition: "to love, to feel and exhibit esteem and goodwill to a person, to prize and delight in a thing."
      },
      "G0026": {
          id: "G0026", lemma: "ἀγάπη", translit: "agapē", gloss: "love",
          pastoral: "The settled choice to seek another's good. The love that holds even when feelings don't.",
          definition: "love, goodwill, esteem. The spiritual bond characteristic of Christianity."
      }
    };

    function App() {
      const [screen, setScreen] = useState('welcome');
      const [name, setName] = useState('');
      const [selectedWord, setSelectedWord] = useState(null);
      const [showFullModal, setShowFullModal] = useState(false);

      const handleWordTap = (strongs) => {
        if (selectedWord === strongs) {
          setShowFullModal(true);
        } else {
          setSelectedWord(strongs);
        }
      };

      // --- Screens ---
      const Welcome = () => (
        <div className="body">
          <h1 style={{fontSize: '32px', marginBottom: '20px'}}>EDGE</h1>
          <p style={{marginBottom: '30px', color: 'var(--ink-soft)'}}>Read. Understand. Respond.</p>
          <input className="input" placeholder="Your first name" value={name} onChange={e => setName(e.target.value)} />
          <button className="btn" onClick={() => setScreen('home')}>Get Started</button>
        </div>
      );

      const Reader = () => (
        <div className="body">
          <span style={{fontSize: '12px', color: 'var(--muted)', textTransform: 'uppercase'}}>John 3:16 · BSB</span>
          <div className="verse-card">
            For God so <span className={`tappable-word ${selectedWord === 'G0025' ? 'is-active' : ''}`} onClick={() => handleWordTap('G0025')}>loved</span> the world that He gave His one and only Son...
          </div>

          {selectedWord && (
            <div className="quick-banner" onClick={() => setShowFullModal(true)}>
              <div className="quick-title">
                <span>{LEXICON[selectedWord].gloss}</span>
                <span style={{fontFamily: 'var(--serif)', fontWeight: 'normal'}}>{LEXICON[selectedWord].lemma}</span>
              </div>
              <div className="quick-body">
                {LEXICON[selectedWord].pastoral}
              </div>
              <div className="dig-hint">Tap again to dig deeper →</div>
            </div>
          )}
          
          <button className="btn" onClick={() => setScreen('welcome')}>Restart</button>
        </div>
      );

      return (
        <div className="phone">
          <div className="progress-bar">
            <div className={`progress-segment ${['welcome','home'].includes(screen) ? '' : 'active'}`} style={{background: 'var(--edge-explore)'}}></div>
            <div className="progress-segment" style={{background: 'var(--edge-dig)'}}></div>
            <div className="progress-segment" style={{background: 'var(--edge-gather)'}}></div>
            <div className="progress-segment" style={{background: 'var(--edge-embrace)'}}></div>
          </div>
          <div className="header">
            <div style={{fontWeight: 'bold', letterSpacing: '2px'}}>EDGE</div>
          </div>

          {screen === 'welcome' ? <Welcome /> : <Reader />}

          {showFullModal && selectedWord && (
            <div className="modal-overlay" onClick={() => setShowFullModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <button className="close-btn" onClick={() => setShowFullModal(false)}>×</button>
                <div className="modal-header">
                  <h2 style={{fontFamily: 'var(--serif)', fontSize: '28px'}}>{LEXICON[selectedWord].lemma}</h2>
                  <p style={{color: 'var(--muted)'}}>{LEXICON[selectedWord].translit} · {selectedWord}</p>
                </div>
                <div className="pastoral-note">
                  <span className="pastoral-label">What this means</span>
                  <p style={{fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: '18px'}}>{LEXICON[selectedWord].pastoral}</p>
                </div>
                <h3 style={{fontSize: '12px', textTransform: 'uppercase', marginBottom: '10px', color: 'var(--muted)'}}>Scholarly Definition</h3>
                <p style={{lineHeight: '1.6', marginBottom: '20px'}}>{LEXICON[selectedWord].definition}</p>
                <button className="btn" onClick={() => setShowFullModal(false)}>Close Analysis</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
