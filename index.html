<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>EDGE Bible Study</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0E2A52; --navy-deep: #081A35; --accent: #2A7BD4; --accent-soft: #E8F1FB;
      --ink: #0F172A; --ink-soft: #334155; --muted: #64748B; --rule: #E2E8F0;
      --paper: #FFFFFF; --canvas: #F8FAFC;
      --edge-explore: #4A9D4A; --edge-dig: #E08833; --edge-gather: #2A7BD4; --edge-embrace: #8E54B5;
      --serif: 'Lora', 'EB Garamond', serif; --sans: 'Atkinson Hyperlegible', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #DDD6C8; font-family: var(--sans); color: var(--ink); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
    .phone {
      width: 100%; max-width: 600px; height: 90vh; max-height: 900px;
      background: var(--paper); border-radius: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.2);
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    .progress-bar { height: 6px; background: var(--rule); display: flex; flex-shrink: 0; }
    .progress-fill { height: 100%; transition: width 0.4s ease; background: var(--navy); }
    .header { background: var(--navy); color: white; padding: 40px 20px 15px; position: relative; flex-shrink: 0; }
    .header::after {
        content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
        background: linear-gradient(90deg, var(--edge-explore) 25%, var(--edge-dig) 50%, var(--edge-gather) 75%, var(--edge-embrace) 100%);
    }
    .body { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; }
    .label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }
    .btn { background: var(--navy); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
    .input { width: 100%; padding: 14px; border: 2px solid var(--rule); border-radius: 12px; margin-bottom: 20px; font-size: 17px; font-family: var(--serif); outline: none; }
    .hint-box { background: #FFF8ED; border: 1px solid #E8C87A; border-radius: 12px; padding: 16px; margin-bottom: 20px; font-size: 14px; color: #7A5C1E; }
    .tappable-word { color: var(--accent); cursor: pointer; }
    .quick-banner { background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%); color: white; border-radius: 12px; padding: 16px; margin-bottom: 20px; cursor: pointer; }
    @media (max-width: 600px) { body { padding: 0; } .phone { max-width: 100%; height: 100vh; border-radius: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const EDGE_FLOW = [
      { id: 'E', title: 'Explore', subSteps: ['Read', 'Examine', 'Analyze', 'Define'], color: '#4A9D4A' },
      { id: 'D', title: 'Dig', subSteps: ['Details', 'Investigate', 'Grasp'], color: '#E08833' },
      { id: 'G', title: 'Gather', subSteps: ['Key Message', 'Nature of God', 'Outcome'], color: '#2A7BD4' },
      { id: 'E2', title: 'Embrace', subSteps: ['Apply', 'Commit', 'Take Action'], color: '#8E54B5' }
    ];

    const HINTS = {
      'Read': 'Read the passage twice slowly. Let the words sink in. What do you hear God saying?',
      'W': 'Identify the English word that stands out. Why did you pick it?',
      'Details': 'Who is speaking? Who is being addressed? Where are they?'
    };

    const App = () => {
      const [screen, setScreen] = useState('welcome');
      const [name, setName] = useState('');
      const [mainIdx, setMainIdx] = useState(0);
      const [subIdx, setSubIdx] = useState(0);
      const [showHint, setShowHint] = useState(false);

      const next = () => {
        const currentMain = EDGE_FLOW[mainIdx];
        if (subIdx < currentMain.subSteps.length - 1) {
          setSubIdx(subIdx + 1);
        } else if (mainIdx < EDGE_FLOW.length - 1) {
          setMainIdx(mainIdx + 1);
          setSubIdx(0);
        } else {
          setScreen('done');
        }
        setShowHint(false);
      };

      if (screen === 'welcome') return (
        <div className="phone"><div className="header">EDGE</div><div className="body">
          <h1>Welcome</h1><input className="input" value={name} onChange={e => setName(e.target.value)} placeholder="Enter name" />
          <button className="btn" onClick={() => setScreen('home')}>Start</button>
        </div></div>
      );

      if (screen === 'home') return (
        <div className="phone"><div className="header">EDGE</div><div className="body">
          <h1>Hello, {name}</h1><button className="btn" onClick={() => setScreen('study')}>New Study</button>
        </div></div>
      );

      const currentMain = EDGE_FLOW[mainIdx];
      const currentSub = currentMain.subSteps[subIdx];

      return (
        <div className="phone">
          <div className="progress-bar"><div className="progress-fill" style={{width: `${((mainIdx * 4 + subIdx) / 16) * 100}%`}}></div></div>
          <div className="header" style={{background: currentMain.color}}>
            <span style={{fontSize: '12px'}}>{currentMain.title}</span>
            <h2>{currentSub}</h2>
          </div>
          <div className="body">
            <button className="btn" style={{background: 'transparent', border: '1px solid #ccc', color: '#666', marginBottom: '10px'}} onClick={() => setShowHint(!showHint)}>
              {showHint ? 'Hide Hint' : '💡 Need a nudge?'}
            </button>
            {showHint && <div className="hint-box">{HINTS[currentSub] || "Meditate on this step..."}</div>}
            <textarea className="input" rows="8" placeholder={`Reflections for ${currentSub}...`} style={{flex: 1}}></textarea>
            <button className="btn" style={{background: currentMain.color}} onClick={next}>Continue →</button>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
